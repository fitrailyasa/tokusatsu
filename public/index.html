<!DOCTYPE html>
<html>
  <head>
    <style>
      .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }

      .gallery img {
        width: 200px;
        height: 200px;
        object-fit: cover;
        margin: 5px;
      }

      .gallery .image-container {
        margin: 5px;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="gallery round"></div>

    <div class="text-center m-5">
      <button class="btn btn-primary" onclick="printGallery()">Print</button>
    </div>

    <script>
      // Mendapatkan elemen galeri
      var gallery = document.querySelector(".gallery");

      // Loop melalui daftar gambar dan menambahkan elemen img ke galeri
      for (var i = 1; i <= 20; i++) {
        var img = document.createElement("img");
        img.src =
          "assets/img/Kamen Rider/All Rider Bike/bike_mc_heisei (" +
          i +
          ").jpg";

        var imageContainer = document.createElement("div");
        imageContainer.classList.add("image-container");
        imageContainer.appendChild(img);

        gallery.appendChild(imageContainer);
      }

      // Fungsi untuk mencetak galeri
      function printGallery() {
        window.print();
      }
    </script>
  </body>
</html>
